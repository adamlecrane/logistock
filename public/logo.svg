<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <defs>
    <linearGradient id="topFace" x1="0" y1="0" x2="1" y2="0.6">
      <stop offset="0%" stop-color="#FF2E1F"/>
      <stop offset="100%" stop-color="#E10600"/>
    </linearGradient>
    <linearGradient id="leftFace" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#C40500"/>
      <stop offset="100%" stop-color="#8E0300"/>
    </linearGradient>
    <linearGradient id="rightFace" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E10600"/>
      <stop offset="100%" stop-color="#A50400"/>
    </linearGradient>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1A1A1A"/>
      <stop offset="100%" stop-color="#000000"/>
    </linearGradient>
  </defs>

  <!-- Rounded background -->
  <rect x="0" y="0" width="200" height="200" rx="44" fill="url(#bg)"/>

  <!-- Isometric cube: top + left + right faces -->
  <g transform="translate(100 100)">
    <!-- Top face -->
    <path d="M 0 -52 L 50 -22 L 0 8 L -50 -22 Z" fill="url(#topFace)"/>
    <!-- Left face -->
    <path d="M -50 -22 L 0 8 L 0 60 L -50 30 Z" fill="url(#leftFace)"/>
    <!-- Right face -->
    <path d="M 50 -22 L 0 8 L 0 60 L 50 30 Z" fill="url(#rightFace)"/>

    <!-- Lightning bolt on top face -->
    <path d="M -6 -38 L 12 -28 L -2 -22 L 8 -10 L -10 -20 L 4 -26 Z"
          fill="#FFFFFF" opacity="0.95"/>

    <!-- Subtle edge highlight -->
    <path d="M 0 -52 L 50 -22 L 0 8 L -50 -22 Z"
          fill="none" stroke="#FFFFFF" stroke-opacity="0.18" stroke-width="1"/>
  </g>
</svg>
